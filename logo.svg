  <!-- Scale 2 (Right) -->
  <!-- Hanging cords -->
  <line x1="392" y1="170" x2="352" y2="280" stroke="#1A1A1A" stroke-width="6"/>
  <line x1="392" y1="170" x2="432" y2="280" stroke="#1A1A1A" stroke-width="6"/>
  <!-- Right Pan -->
